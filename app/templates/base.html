<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}But Market Virtuel{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&family=Poppins:wght@300;500;700&display=swap"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <header class="app-header">
      <div class="logo">But Market<span>360°</span></div>
      <nav>
        <a href="{{ url_for('store.index') }}">Accueil</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
